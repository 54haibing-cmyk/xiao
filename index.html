<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>🍓 炫彩水果消消乐 - Pi 版</title>
    
    <!-- Pi SDK（必须放在这里） -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // 初始化 Pi SDK（推荐 sandbox: true 用于测试）
        Pi.init({ 
            version: "2.0", 
            sandbox: true   // 上线前改为 false
        }).then(() => {
            console.log("✅ Pi SDK 初始化成功");
        }).catch(console.error);
    </script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            background: radial-gradient(circle at top, #2b1055, #12002f 70%);
            min-height:100vh;
            overflow:hidden;
            font-family:"Arial", sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }
        /* 星空 */
        .stars { position:fixed; inset:0; overflow:hidden; z-index:0; }
        .star {
            position:absolute;
            background:white;
            border-radius:50%;
            animation:twinkle 3s infinite alternate;
        }
        @keyframes twinkle { from{opacity:0.3;} to{opacity:1;} }

        .game {
            position:relative; z-index:2;
            width:95vw; max-width:520px;
            padding:18px;
            border-radius:25px;
            backdrop-filter:blur(12px);
            background:rgba(255,255,255,0.08);
            border:2px solid rgba(255,255,255,0.15);
            box-shadow:0 0 45px rgba(255,120,255,0.3);
        }

        .title { text-align:center; font-size:36px; margin-bottom:8px; text-shadow:0 0 20px #ff89ff; }

        .topbar {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:12px; font-size:18px;
        }

        .timer { color:#ff6b6b; font-weight:bold; }

        .board {
            display:grid;
            grid-template-columns:repeat(8,1fr);
            gap:5px;
            background:rgba(0,0,0,0.3);
            padding:10px;
            border-radius:20px;
            position:relative;
        }

        .cell {
            aspect-ratio:1/1;
            border-radius:15px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:38px;
            cursor:pointer;
            transition:all 0.2s;
            background:rgba(255,255,255,0.1);
            box-shadow:inset 0 3px 8px rgba(255,255,255,0.25), 0 4px 12px rgba(0,0,0,0.4);
            position:relative;
            overflow:hidden;
        }

        .cell:active { transform:scale(0.88); }
        .selected { transform:scale(1.22); box-shadow:0 0 30px #fff, 0 0 55px #ff77ff; }

        .clearing {
            animation: electric 0.45s forwards;
        }
        @keyframes electric {
            0% { transform:scale(1); filter:brightness(1); }
            30% { transform:scale(1.3); filter:brightness(3) hue-rotate(50deg); }
            100% { transform:scale(0); filter:brightness(1); }
        }

        #connection { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5; }

        .float-score {
            position:absolute;
            font-size:22px;
            font-weight:bold;
            color:#ffe66d;
            text-shadow:0 0 10px #ff0;
            pointer-events:none;
            z-index:10;
            animation:floatUp 1.2s forwards;
        }

        @keyframes floatUp {
            0% { transform:translateY(0); opacity:1; }
            100% { transform:translateY(-80px); opacity:0; }
        }

        .controls { margin-top:15px; text-align:center; }
        button {
            padding:12px 24px;
            margin:0 6px;
            border:none;
            border-radius:50px;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            color:white;
            background:linear-gradient(45deg,#ff4fd8,#ff7b00);
            box-shadow:0 0 20px rgba(255,120,255,0.7);
        }

        .combo { text-align:center; margin:10px 0; color:#ffe66d; font-size:23px; height:32px; text-shadow:0 0 12px #ff0; }

        .pi-info {
            text-align:center;
            margin:10px 0;
            font-size:14px;
            color:#a0ffcc;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="game">
    <div class="title">🍓 炫彩水果消消乐 🍇</div>
    
    <div class="topbar">
        <div>⭐ 分数：<span id="score">0</span></div>
        <div class="timer">⏱️ <span id="time">60</span></div>
        <div>🔥 连击：<span id="comboNum">0</span></div>
    </div>

    <div class="board" id="board">
        <svg id="connection" width="100%" height="100%"></svg>
    </div>

    <div class="combo" id="comboText"></div>
    <div class="pi-info">🌟 Pi 生态专版 • 尽情消消乐！</div>

    <div class="controls">
        <button onclick="toggleMusic()">🎵 音乐</button>
        <button onclick="restartGame()">重新开始</button>
    </div>
</div>

<audio id="bgm" loop>
    <source src="https://assets.mixkit.co/music/preview/296/296.wav" type="audio/wav">
</audio>

<script src="script.js"></script>
</body>
</html>
